[pytest]
log_cli = true
log_cli_level = INFO
log_level = INFO
log_format = %(levelname)s %(message)s
testpaths = tests
addopts = --html=api_test_report.html --self-contained-html --css=assets/style.css -v

markers =
    smoke: quick sanity checks (happy path)
    regression: full regression suite (all scenarios)
    performance: non-functional response time assertions
